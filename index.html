<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>곱셈공식 챌린지</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #f3f0f7; display: flex; justify-content: center; font-family: sans-serif; }
        #X_CHALLENGE { text-align: center; background-color: #f3e5f5; padding: 20px; border-radius: 20px; border: 4px solid #9c27b0; width: 100%; max-width: 380px; box-sizing: border-box; min-height: 520px; position: relative; }
        .scr { display: none; } .scr.on { display: block; }
        #t-bar-box { width: 100%; height: 12px; background: #e1bee7; border-radius: 6px; margin-bottom: 15px; overflow: hidden; }
        #t-bar-inner { width: 100%; height: 100%; background: #ab47bc; transition: width 0.1s linear; }
        .st-bar { display: flex; justify-content: space-around; font-weight: bold; color: #4a148c; margin-bottom: 10px; }
        .pr { font-size: 1.6rem; font-weight: bold; margin: 30px 0; min-height: 60px; color: #333; display: flex; align-items: center; justify-content: center; }
        .opt-btn { font-size: 1.05rem; width: 100%; padding: 12px; background: #fff; border: 2px solid #9c27b0; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 8px; color: #7b1fa2; }
        #fb-msg { margin-top:15px; font-weight:bold; min-height: 3em; color: #4a148c; display: flex; align-items: center; justify-content: center; }
        .start-btn { font-size: 1.8rem; padding: 15px 40px; background: #9c27b0; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 50px; }
    </style>
</head>
<body>
<div id="X_CHALLENGE">
    <audio id="myBgm" loop src="bgm.mp3"></audio>

    <div id="S_START" class="scr on">
        <h2 style="color:#7b1fa2;">📐 곱셈공식 챌린지</h2>
        <p id="loading-msg" style="color:gray;">음악을 불러오는 중일 수 있습니다...<br>준비되면 아래 버튼을 누르세요!</p>
        <button id="GO_BTN" class="start-btn">시작하기</button>
    </div>

    <div id="S_QUIZ" class="scr">
        <div id="t-bar-box"><div id="t-bar-inner"></div></div>
        <div class="st-bar">
            <div>점수: <span id="SCORE_VAL">0</span></div>
            <div>시간: <span id="TIME_VAL">60</span>초</div>
        </div>
        <div id="P_TXT" class="pr"></div>
        <div id="O_BOX"></div>
        <div id="fb-msg"></div>
    </div>

    <div id="S_RES" class="scr">
        <h2 style="color:#7b1fa2;">🏁 종료!</h2>
        <p style="font-size: 1.8rem; margin: 10px 0;">최종 점수: <span id="FINAL_SCORE" style="color:red;">0</span>점</p>
        <button onclick="location.reload()" class="opt-btn" style="background:#9c27b0; color:white; margin-top:20px;">다시 시작하기</button>
    </div>
</div>

<script>
(function() {
    var ans = "", score = 0, timeLeft = 60, timer = null, isPaused = false;
    const bgm = document.getElementById('myBgm');

    function init() {
        // 음악 재생 시도 (실패해도 게임은 시작되게!)
        try {
            bgm.play().catch(e => {
                console.log("음악 재생 실패: 파일이 없거나 이름이 다름");
            });
        } catch(e) {}
        
        document.getElementById('S_START').classList.remove('on');
        document.getElementById('S_QUIZ').classList.add('on');
        
        // 기계음(beep) 완전 삭제 확인
        startTimer();
        make();
    }

    function startTimer() {
        if(timer) clearInterval(timer);
        timer = setInterval(function() {
            if(!isPaused) {
                timeLeft--;
                document.getElementById('TIME_VAL').innerText = timeLeft;
                document.getElementById('t-bar-inner').style.width = (timeLeft/60)*100 + "%";
                if(timeLeft <= 0) endGame();
            }
        }, 1000);
    }

    function fmt(f, m, l) {
        var s = "";
        if (f === 1) s += "x²"; else if (f === -1) s += "-x²"; else s += f + "x²";
        if (m !== 0) { s += (m > 0 ? " + " : " - "); var am = Math.abs(m); s += (am === 1 ? "x" : am + "x"); }
        if (l !== 0) s += (l > 0 ? " + " + l : " - " + Math.abs(l));
        return s;
    }

    function make() {
        isPaused = false;
        document.getElementById('fb-msg').innerHTML = "";
        var a = Math.floor(Math.random() * 3) + 1, b = Math.floor(Math.random() * 8) + 1, type = Math.floor(Math.random() * 3);
        var pText = "", correct = "", ws = [];

        if (type === 0) { pText = "("+(a==1?"":a)+"x+"+b+")²"; correct = fmt(a*a, 2*a*b, b*b); ws = [fmt(a*a,0,b*b), fmt(a*a,a*b,b*b), fmt(a*a,2*a*b,b)]; }
        else if (type === 1) { pText = "("+(a==1?"":a)+"x-"+b+")²"; correct = fmt(a*a, -2*a*b, b*b); ws = [fmt(a*a,0,-b*b), fmt(a*a,-2*a*b,-b*b), fmt(a*a,-a*b,b*b)]; }
        else { pText = "("+(a==1?"":a)+"x+"+b+")("+(a==1?"":a)+"x-"+b+")"; correct = fmt(a*a,0,-(b*b)); ws = [fmt(a*a,0,b*b), fmt(a*a,-2*a*b,-b*b), fmt(a*a,0,-b)]; }

        document.getElementById('P_TXT').innerText = pText;
        ans = correct;
        var os = [ans, ws[0], ws[1], ws[2]].sort(() => 0.5 - Math.random());
        var box = document.getElementById('O_BOX'); box.innerHTML = "";
        os.forEach(v => {
            var btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = v;
            btn.onclick = () => { if(!isPaused) check(v); };
            box.appendChild(btn);
        });
    }

    function check(v) {
        if(v === ans) {
            score += 100;
            document.getElementById('SCORE_VAL').innerText = score;
            document.getElementById('fb-msg').innerHTML = "<span style='color:blue;'>정답! +100 ✨</span>";
            setTimeout(make, 300);
        } else {
            isPaused = true; 
            document.getElementById('fb-msg').innerHTML = "<span style='color:red;'>오답! 🧐 정답: </span><br>" + ans;
            setTimeout(make, 1800);
        }
    }

    function endGame() {
        clearInterval(timer);
        bgm.pause();
        document.getElementById('S_QUIZ').classList.remove('on');
        document.getElementById('S_RES').classList.add('on');
        document.getElementById('FINAL_SCORE').innerText = score;
    }

    document.getElementById('GO_BTN').onclick = init;
})();
</script>
</body>
</html>
