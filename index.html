<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>곱셈공식 1분 챌린지 (Music Ver.)</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #f3f0f7; display: flex; justify-content: center; }
        #X_CHALLENGE { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #f3e5f5; padding: 20px; border-radius: 20px; border: 4px solid #9c27b0; width: 100%; max-width: 380px; box-sizing: border-box; min-height: 560px; position: relative; }
        .scr { display: none; }
        .scr.on { display: block; }
        
        /* 타임 바 */
        #t-bar-box { width: 100%; height: 12px; background: #e1bee7; border-radius: 6px; margin-bottom: 15px; overflow: hidden; border: 1px solid #7b1fa2; }
        #t-bar-inner { width: 100%; height: 100%; background: linear-gradient(90deg, #ab47bc, #8e24aa); transition: width 0.1s linear; }
        
        .st-bar { display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 15px; color: #4a148c; font-size: 1.1rem; }
        .pr { font-size: 1.6rem; font-weight: bold; margin: 25px 0; min-height: 70px; display: flex; align-items: center; justify-content: center; color: #333; line-height: 1.4; }
        .btn-grid { display: flex; flex-direction: column; gap: 8px; }
        .opt-btn { font-size: 1.05rem; padding: 12px; background: #fff; border: 2px solid #9c27b0; border-radius: 10px; cursor: pointer; font-weight: bold; color: #7b1fa2; text-align: left; }
        
        #fb-msg { margin-top:15px; font-weight:bold; min-height: 3.5em; font-size: 1rem; line-height: 1.5; display: flex; align-items: center; justify-content: center; border-top: 1px dashed #9c27b0; padding-top: 10px; }
        
        .start-btn { font-size: 1.8rem; padding: 15px 40px; background: #9c27b0; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 40px; }
        .re-btn { font-size: 1.2rem; padding: 15px; background: #4a148c; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 20px; }
        
        /* 사운드 컨트롤 */
        #snd-ctrl { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>
<div id="X_CHALLENGE">
    <div id="snd-ctrl">🔊</div>
    
    <audio id="bgm" loop src="https://pixabay.com/music/download/145459/"></audio>
    <audio id="snd-ok" src="https://t1.daumcdn.net/kakaocorp/kakaocorp/admin/service/1591851241103_6861.mp3"></audio>
    <audio id="snd-no" src="https://t1.daumcdn.net/kakaocorp/kakaocorp/admin/service/1591851253457_1338.mp3"></audio>

    <div id="S_START" class="scr on">
        <h2 style="color:#7b1fa2;">📐 곱셈공식 챌린지 🎵</h2>
        <p style="color:gray;">음악과 함께 즐겁게 풀어보세요!<br>소리가 너무 크면 위 아이콘을 누르세요.</p>
        <button id="GO_BTN" class="start-btn">시작하기</button>
    </div>

    <div id="S_QUIZ" class="scr">
        <div id="t-bar-box"><div id="t-bar-inner"></div></div>
        <div class="st-bar">
            <div>점수: <span id="SCORE_VAL">0</span></div>
            <div>시간: <span id="TIME_VAL">60</span>초</div>
        </div>
        <div id="P_TXT" class="pr"></div>
        <div id="O_BOX" class="btn-grid"></div>
        <div id="fb-msg"></div>
    </div>

    <div id="S_RES" class="scr">
        <h2 style="color:#7b1fa2;">🏁 종료!</h2>
        <p style="font-size: 1.8rem; margin: 10px 0;">최종 점수: <span id="FINAL_SCORE" style="color:red;">0</span>점</p>
        <p id="RANK_MSG" style="font-weight:bold; color:#4a148c;"></p>
        <button id="RE_BTN" class="re-btn">다시 도전</button>
    </div>
</div>

<script>
(function() {
    var ans = "", score = 0, timeLeft = 60, timer = null, isPaused = false, isMuted = false;
    const bgm = document.getElementById('bgm');
    const sOk = document.getElementById('snd-ok');
    const sNo = document.getElementById('snd-no');
    const ctrl = document.getElementById('snd-ctrl');

    // 음소거 제어
    ctrl.onclick = function() {
        isMuted = !isMuted;
        bgm.muted = isMuted;
        sOk.muted = isMuted;
        sNo.muted = isMuted;
        ctrl.innerText = isMuted ? "🔇" : "🔊";
    };

    function init() {
        document.getElementById('S_START').classList.remove('on');
        document.getElementById('S_RES').classList.remove('on');
        document.getElementById('S_QUIZ').classList.add('on');
        score = 0; timeLeft = 60; isPaused = false;
        if(!isMuted) bgm.play(); 
        updateUI();
        make();
        if(timer) clearInterval(timer);
        timer = setInterval(function() {
            if(!isPaused) {
                timeLeft--;
                updateUI();
                if(timeLeft <= 0) endGame();
            }
        }, 1000);
    }

    function updateUI() {
        document.getElementById('SCORE_VAL').innerText = score;
        document.getElementById('TIME_VAL').innerText = timeLeft;
        var per = (timeLeft / 60) * 100;
        document.getElementById('t-bar-inner').style.width = per + "%";
    }

    function fmt(f, m, l) {
        var s = "";
        if (f === 1) s += "x²"; else if (f === -1) s += "-x²"; else s += f + "x²";
        if (m !== 0) {
            s += (m > 0 ? " + " : " - ");
            var am = Math.abs(m); s += (am === 1 ? "x" : am + "x");
        }
        if (l !== 0) s += (l > 0 ? " + " + l : " - " + Math.abs(l));
        return s;
    }

    function make() {
        isPaused = false;
        document.getElementById('fb-msg').innerHTML = "";
        var type = Math.floor(Math.random() * 3);
        var a = Math.floor(Math.random() * 3) + 1;
        var b = Math.floor(Math.random() * 8) + 1;
        var pText = "", correct = "", ws = [];

        if (type === 0) {
            pText = "(" + (a==1?"":a) + "x + " + b + ")²";
            correct = fmt(a*a, 2*a*b, b*b);
            ws = [fmt(a*a, 0, b*b), fmt(a*a, a*b, b*b), fmt(a*a, 2*a*b, b)];
        } else if (type === 1) {
            pText = "(" + (a==1?"":a) + "x - " + b + ")²";
            correct = fmt(a*a, -2*a*b, b*b);
            ws = [fmt(a*a, 0, -b*b), fmt(a*a, -2*a*b, -b*b), fmt(a*a, -a*b, b*b)];
        } else {
            pText = "(" + (a==1?"":a) + "x + " + b + ")(" + (a==1?"":a) + "x - " + b + ")";
            correct = fmt(a*a, 0, -(b*b));
            ws = [fmt(a*a, 0, b*b), fmt(a*a, -2*a*b, -b*b), fmt(a*a, 0, -b)];
        }

        document.getElementById('P_TXT').innerText = pText;
        ans = correct;
        var os = [ans, ws[0], ws[1], ws[2]].sort(function(){return 0.5-Math.random();});
        var box = document.getElementById('O_BOX'); box.innerHTML = "";
        os.forEach(function(v) {
            var btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = v;
            btn.onclick = function() { if(!isPaused) check(v); };
            box.appendChild(btn);
        });
    }

    function check(v) {
        var fb = document.getElementById('fb-msg');
        if(v === ans) {
            score += 100;
            if(!isMuted) sOk.play();
            fb.innerHTML = "<span style='color:blue;'>정답! +100 ✨</span>";
            setTimeout(make, 300);
        } else {
            isPaused = true; 
            if(!isMuted) sNo.play();
            fb.innerHTML = "<span style='color:red;'>오답! 🧐 정답은:</span><br>" + ans;
            setTimeout(make, 1800);
        }
    }

    function endGame() {
        clearInterval(timer);
        bgm.pause();
        document.getElementById('S_QUIZ').classList.remove('on');
        document.getElementById('S_RES').classList.add('on');
        document.getElementById('FINAL_SCORE').innerText = score;
        document.getElementById('RANK_MSG').innerText = "훌륭합니다! 다음 기록에 도전하세요!";
    }

    document.getElementById('GO_BTN').onclick = init;
    document.getElementById('RE_BTN').onclick = init;
})();
</script>
</body>
</html>
